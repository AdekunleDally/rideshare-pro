apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  postgresql.conf: |
    wal_level = replica
    max_wal_senders = 10
    max_replication_slots = 10
    hot_standby = on
    wal_keep_size = 256MB
    listen_addresses = '*'

  pg_hba.conf: |
    local all all trust
    host replication replicator 0.0.0.0/0 md5
    host all all 0.0.0.0/0 md5
