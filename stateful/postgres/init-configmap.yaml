apiVersion: v1
kind: ConfigMap

metadata:
  name: postgres-init-scripts

data:
  init-replication.sh: |
    #!/bin/bash
    set -e

    echo "Creating replication role if it does not exist..."

    psql -v ON_ERROR_STOP=1 \
      --username "$POSTGRES_USER" \
      --dbname "$POSTGRES_DB" <<EOF

    DO \$\$
    BEGIN
      IF NOT EXISTS (
        SELECT 1
        FROM pg_roles
        WHERE rolname='${REPLICATION_USER}'
      ) THEN

        CREATE ROLE ${REPLICATION_USER}
        WITH REPLICATION
        LOGIN
        PASSWORD '${REPLICATION_PASSWORD}';

      END IF;
    END;
    \$\$;

    EOF

    echo "Replication role initialization complete."
